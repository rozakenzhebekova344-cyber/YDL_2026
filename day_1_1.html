<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Анаконда в джунглях</title>
<style>
  :root {
    --bg: #0a1a0d;
    --panel: rgba(12, 30, 16, 0.82);
    --accent: #7cc04a;
    --accent-dark: #4d7d2a;
    --food: #ef4444;
    --text: #eaf3e2;
    --muted: #a7c293;
    --correct: #7cc04a;
    --wrong: #ef6a4a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 16px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    padding: 24px 16px 40px;
    background:
      linear-gradient(rgba(6, 20, 8, 0.62), rgba(6, 20, 8, 0.82)),
      url('img/jungle.jpg') center / cover fixed no-repeat,
      #0a1a0d;
  }

  h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #b6f36a, #7cc04a, #d9c34a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 18px rgba(0, 0, 0, 0.5);
  }

  .scoreboard {
    display: flex;
    gap: 24px;
    font-size: 1.05rem;
  }
  .scoreboard span { color: var(--accent); font-weight: 700; }

  /* Панель вопроса */
  .quiz {
    width: 760px;
    max-width: 100%;
    background: var(--panel);
    border: 1px solid rgba(124, 192, 74, 0.35);
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(3px);
  }
  .quiz .question {
    font-size: 1.15rem;
    font-weight: 600;
    margin-bottom: 12px;
    line-height: 1.35;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(6, 18, 9, 0.7);
    border: 1px solid rgba(124, 192, 74, 0.25);
    border-radius: 10px;
    font-size: 0.98rem;
    transition: border-color 0.2s, background 0.2s;
  }
  .option .num {
    flex: 0 0 26px;
    height: 26px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: var(--accent);
    color: #052e16;
    font-weight: 800;
    font-size: 0.9rem;
  }
  .option.right { border-color: var(--correct); background: rgba(34,197,94,0.15); }
  .option.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.15); }

  .feedback {
    height: 24px;
    font-weight: 700;
    font-size: 1.05rem;
    transition: opacity 0.2s;
  }
  .feedback.ok { color: var(--correct); }
  .feedback.bad { color: var(--wrong); }

  .stage {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.6);
  }

  canvas {
    display: block;
    background:
      linear-gradient(rgba(8, 24, 10, 0.55), rgba(8, 24, 10, 0.75)),
      url('img/jungle.jpg') center / cover no-repeat,
      #0c2410;
    border: 3px solid #4d7d2a;
    border-radius: 18px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(4px);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .overlay.visible { opacity: 1; pointer-events: auto; }
  .overlay h2 { margin: 0; font-size: 2.1rem; color: var(--food); }
  .overlay p { margin: 0; color: var(--muted); }

  /* Обратный отсчёт перед стартом */
  .countdown {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(15, 23, 42, 0.55);
    backdrop-filter: blur(2px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .countdown.visible { opacity: 1; }
  .countdown .read { color: var(--text); font-size: 1.2rem; font-weight: 600; }
  .countdown .num {
    font-size: 6rem;
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 6px 24px rgba(34, 197, 94, 0.5);
  }

  /* Праздник при переходе на новый уровень */
  .levelup {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(4px);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .levelup.visible { opacity: 1; }
  .lvl-title {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 6px 24px rgba(34, 197, 94, 0.45);
  }
  .lvl-cat {
    width: 220px;
    height: 220px;
    object-fit: contain;
    border-radius: 18px;
    background: #0b3d1e;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  .lvl-sub { color: var(--text); font-size: 1.1rem; font-weight: 600; }
  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-10px) scale(1.03); }
  }

  button {
    margin-top: 8px;
    padding: 12px 30px;
    font-size: 1rem;
    font-weight: 700;
    color: #052e16;
    background: linear-gradient(180deg, var(--accent), var(--accent-dark));
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.2s ease;
    box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(34, 197, 94, 0.5); }
  button:active { transform: translateY(0); }

  .hint { color: var(--muted); font-size: 0.9rem; margin: 0; }

  .loader {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button.ghost {
    margin: 0;
    color: var(--text);
    background: var(--panel);
    border: 1px solid #334155;
    box-shadow: none;
    font-size: 0.95rem;
    padding: 10px 18px;
  }
  button.ghost:hover { transform: translateY(-1px); border-color: var(--accent); box-shadow: none; }
  .loader .src { color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>
  <h1>🐍 Анаконда в джунглях</h1>
  <div class="scoreboard">
    <div>Раунд: <span id="round">1</span></div>
    <div>Очки: <span id="score">0</span></div>
    <div>Рекорд: <span id="best">0</span></div>
  </div>

  <div class="quiz">
    <div class="question" id="question">Вопрос…</div>
    <div class="options" id="options"></div>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="stage">
    <canvas id="game" width="760" height="760"></canvas>
    <div class="countdown" id="countdown">
      <div class="read">Читай вопрос…</div>
      <div class="num" id="countNum">7</div>
    </div>
    <div class="levelup" id="levelup">
      <div class="lvl-title" id="lvlTitle">🎉 Раунд 2!</div>
      <img class="lvl-cat" id="lvlCat" src="img/dancing-cat.gif" alt="Танцующий котёнок" />
      <div class="lvl-sub">Вопросы стали сложнее — поехали!</div>
    </div>
    <div class="overlay" id="overlay">
      <h2>Game Over</h2>
      <p>Ваш счёт: <span id="finalScore">0</span></p>
      <button id="restart">Начать заново</button>
    </div>
  </div>

  <p class="hint">Веди анаконду стрелками ← ↑ → ↓ к номеру правильного ответа</p>

  <div class="loader">
    <input type="file" id="docxInput" accept=".docx" hidden />
    <button id="loadDocx" class="ghost">📄 Загрузить вопросы из Word (.docx)</button>
    <span class="src" id="srcInfo">Источник вопросов: встроенные</span>
  </div>

<script src="lib/jszip.min.js"></script>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const roundEl = document.getElementById('round');
  const finalScoreEl = document.getElementById('finalScore');
  const overlay = document.getElementById('overlay');
  const restartBtn = document.getElementById('restart');
  const questionEl = document.getElementById('question');
  const optionsEl = document.getElementById('options');
  const feedbackEl = document.getElementById('feedback');
  const countdownEl = document.getElementById('countdown');
  const countNumEl = document.getElementById('countNum');
  const levelupEl = document.getElementById('levelup');
  const lvlTitleEl = document.getElementById('lvlTitle');
  const docxInput = document.getElementById('docxInput');
  const loadDocxBtn = document.getElementById('loadDocx');
  const srcInfoEl = document.getElementById('srcInfo');

  // ---- Звуки (Mixkit Free License, можно без атрибуции) ----
  const SOUNDS = {
    correct: new Audio('sounds/correct.mp3'), // правильный ответ
    wrong:   new Audio('sounds/wrong.mp3'),   // неправильный ответ
    point:   new Audio('sounds/point.mp3'),   // начисление очков
  };
  Object.values(SOUNDS).forEach(a => { a.preload = 'auto'; a.volume = 0.6; });

  function play(name) {
    const base = SOUNDS[name];
    if (!base) return;
    const a = base.cloneNode();   // клон позволяет звукам накладываться/повторяться
    a.volume = base.volume;
    a.play().catch(() => {});     // браузер разрешит воспроизведение после первого нажатия клавиши
  }

  // ---- Банк вопросов (общая эрудиция по биологии) ----
  // Встроенные вопросы по умолчанию. Можно заменить, загрузив свой Word-файл.
  // correct — индекс правильного варианта; level — сложность (1 — легко … 4 — сложно)
  let QUESTIONS = [
    // --- Уровень 1 (раунд 1): простые ---
    { level: 1, q: 'Какой газ растения выделяют при фотосинтезе?', options: ['Кислород', 'Углекислый газ', 'Азот', 'Водород'], correct: 0 },
    { level: 1, q: 'Сколько камер в сердце человека?', options: ['Четыре', 'Две', 'Три', 'Шесть'], correct: 0 },
    { level: 1, q: 'Самое большое животное на Земле?', options: ['Синий кит', 'Слон', 'Жираф', 'Белая акула'], correct: 0 },
    { level: 1, q: 'Какой орган отвечает за дыхание?', options: ['Лёгкие', 'Сердце', 'Печень', 'Желудок'], correct: 0 },
    { level: 1, q: 'Что пчёлы собирают с цветов?', options: ['Нектар', 'Воду', 'Смолу', 'Кислород'], correct: 0 },
    { level: 1, q: 'Что изучает ботаника?', options: ['Растения', 'Животных', 'Грибы', 'Бактерии'], correct: 0 },
    { level: 1, q: 'Самое быстрое наземное животное?', options: ['Гепард', 'Лев', 'Лошадь', 'Антилопа'], correct: 0 },
    { level: 1, q: 'Из чего состоят все живые организмы?', options: ['Из клеток', 'Из минералов', 'Из кристаллов', 'Из металлов'], correct: 0 },

    // --- Уровень 2 (раунд 2): средние ---
    { level: 2, q: 'Где в клетке происходит фотосинтез?', options: ['Хлоропласт', 'Ядро', 'Митохондрия', 'Рибосома'], correct: 0 },
    { level: 2, q: 'Что переносит кислород в крови?', options: ['Эритроциты', 'Лейкоциты', 'Тромбоциты', 'Плазма'], correct: 0 },
    { level: 2, q: 'Самый большой орган человека?', options: ['Кожа', 'Печень', 'Лёгкие', 'Кишечник'], correct: 0 },
    { level: 2, q: 'Какое вещество делает листья зелёными?', options: ['Хлорофилл', 'Гемоглобин', 'Каротин', 'Меланин'], correct: 0 },
    { level: 2, q: 'Какой орган очищает кровь от токсинов?', options: ['Печень', 'Сердце', 'Желудок', 'Лёгкие'], correct: 0 },
    { level: 2, q: 'К какому классу относится лягушка?', options: ['Земноводные', 'Рыбы', 'Пресмыкающиеся', 'Млекопитающие'], correct: 0 },
    { level: 2, q: 'Какая наука изучает наследственность?', options: ['Генетика', 'Экология', 'Анатомия', 'Зоология'], correct: 0 },
    { level: 2, q: 'Что является единицей наследственности?', options: ['Ген', 'Атом', 'Клетка', 'Молекула воды'], correct: 0 },

    // --- Уровень 3 (раунд 3): сложные ---
    { level: 3, q: 'Сколько хромосом у человека?', options: ['46', '23', '44', '48'], correct: 0 },
    { level: 3, q: 'Как называется деление обычной клетки тела?', options: ['Митоз', 'Мейоз', 'Осмос', 'Диффузия'], correct: 0 },
    { level: 3, q: 'Сколько костей у взрослого человека?', options: ['206', '150', '250', '300'], correct: 0 },
    { level: 3, q: 'Какой витамин образуется под действием солнца?', options: ['Витамин D', 'Витамин C', 'Витамин A', 'Витамин B12'], correct: 0 },
    { level: 3, q: 'Какой белок крови переносит кислород?', options: ['Гемоглобин', 'Инсулин', 'Коллаген', 'Кератин'], correct: 0 },
    { level: 3, q: 'Какой органоид называют «энергостанцией» клетки?', options: ['Митохондрия', 'Ядро', 'Хлоропласт', 'Вакуоль'], correct: 0 },
    { level: 3, q: 'Как называется деление половых клеток?', options: ['Мейоз', 'Митоз', 'Гидролиз', 'Синтез'], correct: 0 },
    { level: 3, q: 'Кто создал теорию эволюции путём естественного отбора?', options: ['Чарльз Дарвин', 'Карл Линней', 'Грегор Мендель', 'Луи Пастер'], correct: 0 },

    // --- Уровень 4 (раунд 4+): очень сложные ---
    { level: 4, q: 'Какие основания входят в состав ДНК?', options: ['А, Т, Г, Ц', 'А, У, Г, Ц', 'А, Т, Г, У', 'Б, В, Г, Д'], correct: 0 },
    { level: 4, q: 'Где в клетке синтезируется белок?', options: ['Рибосома', 'Лизосома', 'Аппарат Гольджи', 'Ядрышко'], correct: 0 },
    { level: 4, q: 'Симбиоз гриба и водоросли — это…', options: ['Лишайник', 'Мох', 'Плесень', 'Папоротник'], correct: 0 },
    { level: 4, q: 'Какой отдел мозга отвечает за координацию движений?', options: ['Мозжечок', 'Гипоталамус', 'Кора', 'Продолговатый мозг'], correct: 0 },
    { level: 4, q: 'Структурно-функциональная единица почки?', options: ['Нефрон', 'Нейрон', 'Альвеола', 'Гепатоцит'], correct: 0 },
    { level: 4, q: 'Гормон, снижающий уровень сахара в крови?', options: ['Инсулин', 'Адреналин', 'Тироксин', 'Глюкагон'], correct: 0 },
    { level: 4, q: 'Молекула, переносящая информацию к рибосоме?', options: ['иРНК', 'тРНК', 'ДНК', 'АТФ'], correct: 0 },
    { level: 4, q: 'Процесс поддержания постоянства внутренней среды?', options: ['Гомеостаз', 'Метаболизм', 'Фотосинтез', 'Митоз'], correct: 0 },
  ];

  let MAX_LEVEL = Math.max(...QUESTIONS.map(q => q.level)); // самый высокий уровень сложности
  const POINTS_PER_ROUND = 50;          // очков для перехода в следующий раунд

  const GRID = 20;                       // клеток по стороне
  const CELL = canvas.width / GRID;      // размер клетки в px (760/20 = 38)

  const START_SPEED = 420;               // мс на шаг в первом раунде (очень медленно)
  const SPEED_STEP = 12;                 // ускорение каждый раунд
  const MIN_SPEED = 220;                 // предел скорости (не быстрее)
  const READ_TIME = 7;                   // секунд на чтение вопроса перед стартом
  const LEVELUP_MS = 3200;               // длительность показа котёнка при новом уровне

  const FOOD_COLORS = ['#f59e0b', '#3b82f6', '#ec4899', '#a855f7']; // цвета номеров 1-4

  let round = 0;
  let snake, dir, nextDir, score, best = 0, running, loopId, countId;
  let foods;            // [{x,y,opt}] — opt: индекс варианта (0..3)
  let current;          // текущий вопрос {q, options(shuffled), correctPos}
  const usedQuestions = new Set(); // индексы уже заданных вопросов (чтобы не повторялись)

  function reset() {
    round = 1;
    roundEl.textContent = round;
    usedQuestions.clear();   // в новой игре вопросы снова доступны
    snake = [{ x: 6, y: 10 }, { x: 5, y: 10 }, { x: 4, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = '0';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    overlay.classList.remove('visible');
    running = false;
    clearInterval(loopId);
    newQuestion();      // показывает вопрос и запускает отсчёт перед стартом
    draw();
  }

  // Праздничный экран с танцующим котёнком при переходе на новый уровень
  function celebrateLevelUp(n, harder) {
    running = false;
    clearInterval(loopId);
    clearInterval(countId);
    lvlTitleEl.textContent = `🎉 Раунд ${n}!`;
    levelupEl.classList.add('visible');
    setTimeout(() => {
      levelupEl.classList.remove('visible');
      newQuestion();   // загрузит более сложный вопрос и запустит отсчёт на чтение
    }, LEVELUP_MS);
  }

  // Обратный отсчёт перед началом движения (перед каждым вопросом)
  function startCountdown() {
    levelupEl.classList.remove('visible');
    running = false;
    clearInterval(loopId);
    clearInterval(countId);
    let left = READ_TIME;
    countNumEl.textContent = left;
    countdownEl.classList.add('visible');
    countId = setInterval(() => {
      left--;
      if (left > 0) {
        countNumEl.textContent = left;
      } else {
        clearInterval(countId);
        countdownEl.classList.remove('visible');
        running = true;
        loopId = setInterval(tick, currentSpeed());
      }
    }, 1000);
  }

  function currentSpeed() {
    return Math.max(MIN_SPEED, START_SPEED - (round - 1) * SPEED_STEP);
  }

  // Перемешивание массива (Фишер–Йейтс)
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function newQuestion() {
    // вопросы текущего уровня сложности (раунд → уровень, но не выше максимального)
    const level = Math.min(round, MAX_LEVEL);
    const pool = QUESTIONS
      .map((q, i) => ({ q, i }))
      .filter(item => item.q.level === level)
      .map(item => item.i);

    // выбираем ещё не заданный вопрос; когда все в уровне исчерпаны — начинаем уровень заново
    let available = pool.filter(i => !usedQuestions.has(i));
    if (available.length === 0) {
      pool.forEach(i => usedQuestions.delete(i)); // сбрасываем только этот уровень
      available = pool;
    }
    const idx = available[Math.floor(Math.random() * available.length)];
    usedQuestions.add(idx);

    const base = QUESTIONS[idx];
    const correctText = base.options[base.correct];

    // перемешиваем варианты, запоминаем новую позицию правильного
    const shuffled = shuffle([...base.options]);
    const correctPos = shuffled.indexOf(correctText);

    current = { q: base.q, options: shuffled, correctPos };

    renderQuiz();
    placeFoods();
    draw();
    startCountdown();   // 7 секунд на чтение перед каждым вопросом
  }

  function renderQuiz() {
    questionEl.textContent = current.q;
    optionsEl.innerHTML = '';
    current.options.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.dataset.pos = i;
      div.innerHTML = `<span class="num" style="background:${FOOD_COLORS[i]}">${i + 1}</span><span>${text}</span>`;
      optionsEl.appendChild(div);
    });
  }

  // Размещаем 4 кормушки с номерами в свободных клетках
  function placeFoods() {
    foods = [];
    const taken = new Set(snake.map(s => s.x + ',' + s.y));
    for (let opt = 0; opt < current.options.length; opt++) {
      let x, y, key;
      do {
        x = Math.floor(Math.random() * GRID);
        y = Math.floor(Math.random() * GRID);
        key = x + ',' + y;
      } while (taken.has(key));
      taken.add(key);
      foods.push({ x, y, opt });
    }
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // стена
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) return gameOver();
    // сам в себя
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    const hit = foods.find(f => f.x === head.x && f.y === head.y);
    if (hit) {
      if (hit.opt === current.correctPos) {
        score += 10;
        scoreEl.textContent = score;
        showFeedback(true);
        flashOption(hit.opt, true);
        play('correct');                      // звук правильного ответа
        setTimeout(() => play('point'), 200);  // звук начисления очков
        // переход в следующий раунд при наборе порога очков
        if (score >= round * POINTS_PER_ROUND) {
          round++;
          roundEl.textContent = round;
          const harder = round <= MAX_LEVEL ? ' Вопросы сложнее!' : '';
          feedbackEl.textContent = `🎉 Раунд ${round}!${harder}`;
          feedbackEl.className = 'feedback ok';
          // праздник с танцующим котёнком, затем следующий (сложнее) вопрос
          celebrateLevelUp(round, harder);
          draw();          // показать выросшую змейку под оверлеем
          return;
        }
        // не выбрасываем хвост — змейка растёт; через паузу новый вопрос
        newQuestion();
      } else {
        score = Math.max(0, score - 5);
        scoreEl.textContent = score;
        showFeedback(false);
        flashOption(hit.opt, false);
        play('wrong');                        // звук неправильного ответа
        // штраф только очками: змейка не растёт, ошибочная кормушка исчезает
        foods = foods.filter(f => f !== hit);
        snake.pop();
      }
    } else {
      snake.pop();
    }

    draw();
  }

  let feedbackTimer;
  function showFeedback(ok) {
    feedbackEl.textContent = ok ? '✅ Верно! +10' : '❌ Неверно! −5';
    feedbackEl.className = 'feedback ' + (ok ? 'ok' : 'bad');
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(() => {
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
    }, 1200);
  }

  // Подсветка варианта в панели
  function flashOption(pos, ok) {
    const el = optionsEl.querySelector(`.option[data-pos="${pos}"]`);
    if (!el) return;
    el.classList.add(ok ? 'right' : 'wrong');
    setTimeout(() => el.classList.remove('right', 'wrong'), 600);
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // кормушки с номерами
    foods.forEach(f => {
      const cx = f.x * CELL + CELL / 2;
      const cy = f.y * CELL + CELL / 2;
      ctx.fillStyle = FOOD_COLORS[f.opt];
      ctx.beginPath();
      ctx.arc(cx, cy, CELL / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';   // тёмный контур для читаемости на фоне джунглей
      ctx.stroke();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${CELL * 0.55}px Segoe UI, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(f.opt + 1), cx, cy + 1);
    });

    // анаконда
    snake.forEach((seg, i) => {
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const cx = x + CELL / 2;
      const cy = y + CELL / 2;
      const isHead = i === 0;

      // тело: оливково-зелёный градиент
      const grd = ctx.createLinearGradient(x, y, x + CELL, y + CELL);
      grd.addColorStop(0, '#7c8a42');
      grd.addColorStop(1, '#465a23');
      ctx.fillStyle = isHead ? '#8a9a48' : grd;
      roundRect(x + 1, y + 1, CELL - 2, CELL - 2, isHead ? 12 : 9);
      ctx.fill();

      if (isHead) {
        drawAnacondaHead(cx, cy);
      } else {
        // характерные тёмные пятна анаконды (в шахматном порядке)
        const off = (i % 2 === 0) ? -CELL * 0.13 : CELL * 0.13;
        ctx.fillStyle = 'rgba(38, 46, 18, 0.9)';
        ctx.beginPath();
        ctx.arc(cx + off, cy, CELL * 0.19, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx - off, cy, CELL * 0.11, 0, Math.PI * 2);
        ctx.fill();
        // блик сверху для объёма
        ctx.fillStyle = 'rgba(200, 220, 150, 0.18)';
        ctx.beginPath();
        ctx.arc(cx - CELL * 0.18, cy - CELL * 0.18, CELL * 0.12, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  }

  // Голова анаконды: глаза по направлению движения и раздвоенный язык
  function drawAnacondaHead(cx, cy) {
    const fx = dir.x, fy = dir.y;       // направление «вперёд»
    const px = -fy, py = fx;            // перпендикуляр (вбок)

    // язык — выдвигается вперёд из пасти
    ctx.strokeStyle = '#d6402e';
    ctx.lineWidth = Math.max(1.5, CELL * 0.06);
    const tBase = CELL * 0.42, tTip = CELL * 0.7;
    ctx.beginPath();
    ctx.moveTo(cx + fx * tBase, cy + fy * tBase);
    ctx.lineTo(cx + fx * tTip, cy + fy * tTip);
    ctx.stroke();
    ctx.beginPath(); // развилка
    ctx.moveTo(cx + fx * tTip, cy + fy * tTip);
    ctx.lineTo(cx + fx * (tTip + CELL * 0.08) + px * CELL * 0.1, cy + fy * (tTip + CELL * 0.08) + py * CELL * 0.1);
    ctx.moveTo(cx + fx * tTip, cy + fy * tTip);
    ctx.lineTo(cx + fx * (tTip + CELL * 0.08) - px * CELL * 0.1, cy + fy * (tTip + CELL * 0.08) - py * CELL * 0.1);
    ctx.stroke();

    // глаза
    const eo = CELL * 0.16;   // смещение вперёд
    const so = CELL * 0.2;    // смещение вбок
    for (const s of [1, -1]) {
      const ex = cx + fx * eo + px * so * s;
      const ey = cy + fy * eo + py * so * s;
      ctx.fillStyle = '#f3e9b8';                 // жёлтый глаз
      ctx.beginPath();
      ctx.arc(ex, ey, CELL * 0.13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#161c0a';                 // вертикальный зрачок
      ctx.beginPath();
      ctx.ellipse(ex + fx * 1.5, ey + fy * 1.5, CELL * 0.045, CELL * 0.1, Math.atan2(fy, fx), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function gameOver() {
    running = false;
    clearInterval(loopId);
    clearInterval(countId);
    countdownEl.classList.remove('visible');
    levelupEl.classList.remove('visible');
    if (score > best) { best = score; bestEl.textContent = best; }
    finalScoreEl.textContent = score;
    overlay.classList.add('visible');
  }

  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 },
    };
    const d = map[e.key];
    if (!d) return;
    e.preventDefault();
    if (d.x === -dir.x && d.y === -dir.y) return; // запрет разворота на 180°
    nextDir = d;
  });

  restartBtn.addEventListener('click', reset);

  // ---- Загрузка вопросов из Word-файла (.docx) ----
  loadDocxBtn.addEventListener('click', () => docxInput.click());
  docxInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const buf = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(buf);
      const docFile = zip.file('word/document.xml');
      if (!docFile) throw new Error('Это не похоже на файл Word (.docx)');
      const xml = await docFile.async('string');
      const parsed = parseDocxQuestions(xml);
      if (parsed.length === 0) {
        alert('В файле не найдено ни одного вопроса в нужном формате.\n\n' +
              'Проверьте формат: строка вопроса начинается с [уровня], ' +
              'правильный ответ — со знака «+», неправильные — со знака «-».');
        return;
      }
      QUESTIONS = parsed;
      MAX_LEVEL = Math.max(...QUESTIONS.map(q => q.level));
      srcInfoEl.textContent = `Источник вопросов: ${file.name} (${parsed.length})`;
      reset();   // начинаем новую игру уже с вашими вопросами
    } catch (err) {
      alert('Не удалось прочитать файл: ' + err.message);
    } finally {
      docxInput.value = '';   // позволяет выбрать тот же файл повторно
    }
  });

  // Превращает текст document.xml в массив вопросов игры
  function parseDocxQuestions(xml) {
    // каждый абзац <w:p> → одна строка; внутри собираем все фрагменты текста <w:t>
    const paragraphs = xml.split(/<\/w:p>/).map(chunk => {
      const parts = [...chunk.matchAll(/<w:t[^>]*>([\s\S]*?)<\/w:t>/g)].map(m => m[1]);
      return unescapeXml(parts.join('')).trim();
    });

    // если в документе есть строка-разделитель «====», берём вопросы только после неё
    // (чтобы инструкция и пример сверху не попали в игру)
    const hasMarker = paragraphs.some(l => l.includes('===='));
    let active = !hasMarker;

    const questions = [];
    let cur = null;
    const pushCur = () => {
      if (cur && cur.correct >= 0 && cur.options.length >= 2 &&
          cur.options.every(o => o.length > 0)) {
        questions.push({ level: cur.level, q: cur.q, options: cur.options, correct: cur.correct });
      }
      cur = null;
    };

    for (const line of paragraphs) {
      if (!active) { if (line.includes('====')) active = true; continue; }
      if (line.includes('====') || line === '') continue;

      const mq = line.match(/^\[(\d+)\]\s*(.+)$/);   // [уровень] текст вопроса
      if (mq) {
        pushCur();
        cur = { level: parseInt(mq[1], 10) || 1, q: mq[2].trim(), options: [], correct: -1 };
        continue;
      }
      if (!cur) continue;

      const f = line[0];
      if (f === '+') {                                // правильный ответ
        cur.correct = cur.options.length;
        cur.options.push(line.slice(1).trim());
      } else if (f === '-' || f === '−' || f === '*' || f === '•') { // неправильный
        cur.options.push(line.slice(1).trim());
      }
    }
    pushCur();
    return questions;
  }

  function unescapeXml(s) {
    return s.replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
            .replace(/&amp;/g, '&');
  }

  reset();
</script>
</body>
